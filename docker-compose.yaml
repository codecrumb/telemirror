# Update and restart: git pull origin master && docker compose up -d --build
services:
  postgres:
    image: postgres:16-alpine
    container_name: telemirror-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  telemirror:
    build: .
    container_name: telemirror
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    environment:
      DATABASE_URL: "postgres://${DB_USER}:${DB_PASS}@postgres/${DB_NAME}"
    env_file:
      - .env
    volumes:
      - ./.configs/mirror.config.yml:/app/.configs/mirror.config.yml
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
